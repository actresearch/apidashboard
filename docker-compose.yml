services:
  api-dashboard:
    image: ${GHCR_IMAGE:-ghcr.io/actresearch/apidashboard:latest}
    container_name: api-dashboard
    restart: unless-stopped
    ports:
      - "${APP_PORT:-5005}:5005"
    environment:
      APP_PORT: 5005
      FLASK_DEBUG: "0"
      API_HEALTH_STREAM_URL: ${API_HEALTH_STREAM_URL:-http://192.168.1.17:5002/stream}
      WATCHDOG_STREAM_URL: ${WATCHDOG_STREAM_URL:-http://192.168.1.17:8001/stream}
      FTP_STREAM_URL: ${FTP_STREAM_URL:-http://192.168.1.17:5000/stream}
    volumes:
      - ${DASHBOARD_LOG_PATH:-/opt/api-dashboard/logs}:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5005/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    labels:
      com.centurylinklabs.watchtower.enable: "true"

  watchtower:
    image: containrrr/watchtower:latest
    container_name: api-dashboard-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command:
      - --label-enable
      - --cleanup
      - --interval
      - "30"
